<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adopt a Fuggler</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style> body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
    header, footer { text-align: center; padding: 20px; }
    .container { flex: 1; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;}
  </style>
</head>
<body>

  <header>
    <h1>Adopt a Fuggler</h1>
  </header>

  <main class="container">
    <!-- Card 1 JPG IMAGE-->
    <div class="card">
        <img src="assets/images/fuggly.jpg" alt="Fuggler Old Tooth" class="card-img">
        <div class="content">
            <h2>Fuggler 1</h2>
            <p>Jpg image optimization.</p>
            <a href="#" class="cta-button">Adopt</a>
        </div>
    </div>

    <!-- Card 2 WEBP IMAGE-->
    <div class="card">
        <picture>
            <source srcset="assets/images/fugonnet.webp" type="image/webp">
            <img src="assets/images/fallback.jpg" alt="Fuggler Showcase" class="card-img" loading="lazy">
        </picture>
        <div class="content">
            <h2>Fuggler 2</h2>
            <p>WebP image optimization.</p>
            <a href="#" class="cta-button">Adopt</a>
        </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Derly Gutierrez Web Design 1</p>
  </footer>

</body>
</html>
